<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00843D">
    <title>Syngenta — 12 Month Shelf Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00843D 0%, #005A2B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .brand {
            margin-bottom: 24px;
        }
        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1F2933;
            margin-top: 12px;
        }
        .brand p {
            font-size: 14px;
            color: #52616B;
            margin-top: 4px;
        }
        .apps {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
        }
        .app-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border: 2px solid #D9E2EC;
            border-radius: 16px;
            text-decoration: none;
            color: #1F2933;
            transition: all 0.2s;
            text-align: left;
        }
        .app-btn:hover {
            border-color: #00843D;
            background: #F3FAF6;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,132,61,0.12);
        }
        .app-icon {
            width: 48px;
            height: 48px;
            background: #E6F4EC;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .app-info h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .app-info p {
            font-size: 13px;
            color: #52616B;
            margin-top: 2px;
        }
        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: #7B8794;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
                <rect width="40" height="40" rx="8" fill="#00843D"/>
                <path d="M12 28V14l8-6 8 6v14H12zm4-2h8v-4h-8v4zm0-6h8v-4h-8v4z" fill="white"/>
            </svg>
            <h1>12 Month Shelf Life</h1>
            <p>Inventory Tracking System</p>
        </div>
        <div class="apps">
            <a class="app-btn" href="operator-app/">
                <div class="app-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00843D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    </svg>
                </div>
                <div class="app-info">
                    <h3>Operator App</h3>
                    <p>Count inventory, receive &amp; dispatch products</p>
                </div>
            </a>
            <a class="app-btn" href="admin-app/admin-panel.html">
                <div class="app-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00843D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
                    </svg>
                </div>
                <div class="app-info">
                    <h3>Admin Dashboard</h3>
                    <p>Reports, analytics &amp; settings</p>
                </div>
            </a>
        </div>
        <div class="footer">Syngenta — Inventory Management System</div>
    </div>
</body>
</html>
